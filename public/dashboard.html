<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สรุปผลเช็คชื่อ (Dashboard)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg p-6">
        
        <div class="flex flex-wrap justify-between items-center mb-6 pb-4 border-b">
            <h1 class="text-2xl font-bold text-gray-800"><i class="fa-solid fa-chart-pie"></i> สรุปผลและสถิติ</h1>
            <div class="mt-2 md:mt-0 space-x-2">
                <a href="index.html" class="bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300"><i class="fa-solid fa-house"></i> หน้าแรก</a>
                <a href="settings.html" class="bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-800"><i class="fa-solid fa-gear"></i> ตั้งค่าระบบ</a>
            </div>
        </div>

        <div class="flex flex-wrap justify-between items-end mb-6 bg-blue-50 p-4 rounded-lg border border-blue-100">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">เลือกวันที่ดูข้อมูล</label>
                <input type="date" id="filterDate" class="p-2 border rounded font-semibold text-blue-700">
            </div>
            <div class="mt-4 md:mt-0 space-x-2 flex">
                <button id="deleteBtn" onclick="deleteAttendance()" class="bg-red-700 text-white px-4 py-2 rounded hover:bg-red-800 shadow hidden mr-4"><i class="fa-solid fa-trash"></i> ลบข้อมูลวันนี้</button>
                
                <button onclick="exportExcel()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 shadow"><i class="fa-solid fa-file-excel"></i> Excel</button>
                <button onclick="exportPDF()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 shadow"><i class="fa-solid fa-file-pdf"></i> PDF</button>
            </div>
        </div>

        <div id="pdfArea" class="p-4">
            
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold text-gray-800" id="reportTitle">รายงานการเช็คชื่อ</h2>
                <div class="inline-block bg-gray-100 px-4 py-2 rounded-full mt-2 border">
                    <p class="text-sm text-gray-600 font-medium" id="reportMeta"><i class="fa-solid fa-user-pen"></i> ผู้บันทึก: - | <i class="fa-solid fa-clock"></i> อัปเดตล่าสุด: -</p>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-8">
                <div class="bg-gray-100 p-3 rounded-lg text-center shadow border-b-4 border-gray-400">
                    <p class="text-xs text-gray-600 font-bold">ทั้งหมด</p>
                    <h3 class="text-2xl font-bold text-gray-700" id="statTotal">0</h3>
                </div>
                <div class="bg-green-100 p-3 rounded-lg text-center shadow border-b-4 border-green-500">
                    <p class="text-xs text-gray-600 font-bold">มาเรียน</p>
                    <h3 class="text-xl font-bold text-green-700" id="statPresent">0</h3>
                </div>
                <div class="bg-red-100 p-3 rounded-lg text-center shadow border-b-4 border-red-500">
                    <p class="text-xs text-gray-600 font-bold">ขาดเรียน</p>
                    <h3 class="text-xl font-bold text-red-700" id="statAbsent">0</h3>
                </div>
                <div class="bg-yellow-100 p-3 rounded-lg text-center shadow border-b-4 border-yellow-500">
                    <p class="text-xs text-gray-600 font-bold">ป่วย</p>
                    <h3 class="text-xl font-bold text-yellow-700" id="statSick">0</h3>
                </div>
                <div class="bg-blue-100 p-3 rounded-lg text-center shadow border-b-4 border-blue-500">
                    <p class="text-xs text-gray-600 font-bold">ลากิจ</p>
                    <h3 class="text-xl font-bold text-blue-700" id="statLeave">0</h3>
                </div>
                <div class="bg-orange-100 p-3 rounded-lg text-center shadow border-b-4 border-orange-500">
                    <p class="text-xs text-gray-600 font-bold">สาย/มีกิจ</p>
                    <h3 class="text-xl font-bold text-orange-700" id="statLate">0</h3>
                </div>
            </div>

            <div class="w-full max-w-sm mx-auto mb-8">
                <canvas id="attendanceChart"></canvas>
            </div>

            <div class="overflow-x-auto shadow-sm rounded-lg border">
                <table id="attendanceTable" class="w-full text-left border-collapse">
                    <thead class="bg-gray-800 text-white">
                        <tr>
                            <th class="p-3 border text-center">เลขที่</th>
                            <th class="p-3 border text-center">รหัสนักเรียน</th>
                            <th class="p-3 border">ชื่อ - นามสกุล</th>
                            <th class="p-3 border text-center">สถานะ</th>
                            <th class="p-3 border text-center">หมายเหตุ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module" src="dashboard.js"></script>
    <script>
        function exportExcel() {
            let table = document.getElementById("attendanceTable");
            let wb = XLSX.utils.table_to_book(table, {sheet: "สรุปการเช็คชื่อ"});
            XLSX.writeFile(wb, "รายงานการเช็คชื่อ.xlsx");
        }
        function exportPDF() {
            const element = document.getElementById('pdfArea');
            const opt = {
                margin: 0.5, filename: 'รายงานเช็คชื่อ.pdf', image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
